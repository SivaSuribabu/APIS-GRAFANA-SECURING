<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <title>Deployment App</title>
    <link rel="stylesheet" type="text/css" th:href="@{/css/styles.css}" />
</head>
<body>
<div class="page-shell">
    <div class="hero-card">
        <div class="hero-content">
            <h1>Deployment App</h1>
            <p>Sign in or sign up with your username and password. Your account will be stored in the configured MySQL database.</p>
            <div class="action-group">
                <a class="button button-primary" th:href="@{/signup}">Sign Up</a>
                <a class="button button-secondary" th:href="@{/login}">Log In</a>
            </div>
            <p class="meta">Application running on port <strong th:text="${serverPort}">8085</strong>.</p>
        </div>
    </div>
</div>
</body>
</html>
